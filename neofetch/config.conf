print_info() {
    # This sets the subtitle color (the "OS", "Host", etc. part) 
    # using your Peach color (#E8D1C5)
    color_elapsed="\033[38;2;232;209;197m"
    rest="\033[0m"

    info "${color_elapsed}َ°£‡ OS${rest}" distro
    info "${color_elapsed}َ°Œ½ Host${rest}" model
    info "${color_elapsed}َ°”ڑ Kernel${rest}" kernel
    info "${color_elapsed}َ°ڈ– Uptime${rest}" uptime
    info "${color_elapsed}َ±†ƒ Shell${rest}" shell
    info "${color_elapsed}ï’ˆ WM${rest}" wm
    info "${color_elapsed}َ°†چ Terminal${rest}" term
    info "${color_elapsed}َ°چ› Memory${rest}" memory

    info cols
}

# --- Backend Settings ---
image_backend="ascii"
image_source="${HOME}/.config/neofetch/ASCII_art/saitama1.txt"

# --- Ascii Options ---
ascii_bold="on"

# Helper for the text file
c0="\033[0m"
# Set these to 7 (white) so Neofetch doesn't try to use standard colors elsewhere
c1="7"
c2="7"
c3="7"
c4="7"
c5="7"
c6="7"

